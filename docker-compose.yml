# ── Secrets (Docker Secrets из файлов) ────────────────────
secrets:
  pg_password:
    file: ../tg-digest-secrets/pg_password.txt
  llm_api_key:
    file: ../tg-digest-secrets/llm_api_key.txt
  tg_api_id:
    file: ../tg-digest-secrets/tg_api_id.txt
  tg_api_hash:
    file: ../tg-digest-secrets/tg_api_hash.txt
  tg_reader_session:
    file: ../tg-digest-secrets/tg_reader_session.txt
  tg_publisher_session:
    file: ../tg-digest-secrets/tg_publisher_session.txt
