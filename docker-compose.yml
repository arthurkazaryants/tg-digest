# ── Named Network для изоляции контейнеров ──────────────────────
networks:
  tg-digest-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tg_digest_postgres
    restart: unless-stopped
    env_file: .env
    networks:
      - tg-digest-net
    environment:
      POSTGRES_DB: tg_digest
      POSTGRES_USER: tg_digest
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_digest -d tg_digest"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Reader — собирает посты из Telegram-каналов ─────────
  reader:
    build: ./app/reader
    container_name: tg_digest_reader
    restart: unless-stopped
    env_file: .env
    networks:
      - tg-digest-net
    depends_on:
      postgres:
        condition: service_healthy
    user: "1001:1001"  # Run as non-privileged user (tg-digest inside container)
    environment:
      APP_ENV: prod
      POSTGRES_DB: tg_digest
      POSTGRES_USER: tg_digest
      DB_HOST: postgres
      DB_PORT: 5432
      CONFIG: /app/config/config.yml
    secrets:
      - tg_api_id
      - tg_api_hash
      - tg_reader_session
      - pg_password
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio, asyncpg; asyncio.run(asyncpg.connect('postgresql://tg_digest@postgres:5432/tg_digest', password='dummy'))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Publisher — публикует посты в Telegram канал ───────────────
  publisher:
    build: ./app/publisher
    container_name: tg_digest_publisher
    restart: unless-stopped
    env_file: .env
    networks:
      - tg-digest-net
    depends_on:
      postgres:
        condition: service_healthy
    user: "1001:1001"  # Run as non-privileged user
    environment:
      APP_ENV: prod
      POSTGRES_DB: tg_digest
      POSTGRES_USER: tg_digest
      DB_HOST: postgres
      DB_PORT: 5432
      CONFIG: /app/config/config.yml
    secrets:
      - tg_api_id
      - tg_api_hash
      - tg_publisher_session
      - pg_password
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio, asyncpg; asyncio.run(asyncpg.connect('postgresql://tg_digest@postgres:5432/tg_digest', password='dummy'))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Engine — обрабатывает посты через LLM ───────────────
  # engine:
  #   build: ./app/engine
  #   container_name: tg_digest_engine
  #   restart: unless-stopped
