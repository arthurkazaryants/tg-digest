  #     DEBUG: "false"
  #   secrets:
  #     - llm_api_key
  #     - pg_password
  #   volumes:
  #     #- ./config/prompts:/app/config/prompts:ro
  #     - ./config:/app/config:ro

  # ── Publisher — публикует дайджест в канал ───────────────
  # publisher:
  #   build: ./app/publisher
  #   container_name: tg_digest_publisher
  #   restart: unless-stopped
  #   env_file: .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     APP_ENV: prod
  #     POSTGRES_DB: tg_digest
  #     POSTGRES_USER: tg_digest
  #     DB_HOST: postgres
  #     DB_PORT: 5432
