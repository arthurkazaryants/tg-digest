# Конфигурация PUBLISHER (АКТИВНО)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

publisher:
  # Общие параметры
  schedule: "0 */1 * * *"           # Когда запускать: каждый час
  queue_check_interval: 300          # Проверять очередь каждые 5 минут (сек)
  queue_threshold: 20                # Если > 20 постов, публиковать немедленно
  
  # Публикация по тегам
  sources:
    jobs:
      enabled: true
      target_channel: -1003328023126   # Куда публиковать
      batch_limit: 10                         # Макс постов за раз
      # format: "compact"  # На будущее: compact/full/summary
