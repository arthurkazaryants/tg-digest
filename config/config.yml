# ═══════════════════════════════════════════════════════════════════
# Конфигурация TG-Digest: reader → engine → publisher
# ═══════════════════════════════════════════════════════════════════
#
# СТРУКТУРА (слева направо — порядок обработки):
#
# READER (✓ активно сейчас)
#   ├─ channels       ← какие каналы собирать из Telegram
#   ├─ tag_filters    ← как фильтровать посты перед сохранением
#   └─ news/learning_topics ← примеры подклассификации (на будущее)
#
# ENGINE (на будущее, когда реализуется LLM обработка)
#   ├─ sources_for_engine  ← откуда брать посты из БД (какие теги)
#   └─ llm_prompts         ← как обрабатывать (системные промпты)
#
# PUBLISHER (на будущее, когда реализуется отправка дайджестов)
#   ├─ sources_for_publisher  ← откуда брать обработанные посты
#   └─ routing                ← где и когда публиковать
#
# ═══════════════════════════════════════════════════════════════════



# ═════════════════════════════════════════════════════════════════
# 1️⃣  READER: Сбор постов из Telegram (АКТИВНО)
# ═════════════════════════════════════════════════════════════════

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Параметры Reader
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

reader:
  schedule: "0 */4 * * *"          # Cron: каждые 4 часа
  poll_interval_sec: 3600            # Если FETCH_MODE=polling
  backfill_days: 14                  # Глубина первого опроса
  # fetch_mode: "polling"            # или "once" (в docker-compose)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Каналы для мониторинга
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# username  — имя Telegram-канала (без @)
# limit     — макс. последних постов за один опрос
# tags      — категории для связи с tag_filters

channels:
  - username: remote_it_jobs
    limit: 40
    tags: [jobs]

#  - username: devops_deflope
#    limit: 50
#    tags: [jobs, news]
#  - username: habr_com
#    limit: 50
#    tags: [news, learning]
#  - username: pythonl
#    limit: 40
#    tags: [learning]


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Фильтры по тегам (универсальный механизм)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# include_keywords — ОБЯЗАТЕЛЕН!
# exclude_keywords, location_preferences, seniority — опциональны

tag_filters:
  
  jobs:
    include_keywords:
      - "cto"
      - "cio"
      - "it director"
      - "head of infrastructure"
      - "director of engineering"
      - "devops"
      - "platform"
      - "cloud"
      - "kubernetes"
      - "sre"
      - "architecture"
      - "fintech"
      - "payments"
      # - "*"  # Раскомментируйте для тестирования
    
    exclude_keywords:
      - "junior"
      - "intern"
      - "стажер"
      - "sales"
      - "designer"
    
    location_preferences:
      - "remote"
      - "удаленно"
      - "hybrid"
      - "москва"
      - "санкт-петербург"
    
    seniority:
      - "lead"
      - "head"
      - "director"
      - "principal"

  # news:
  #   include_keywords: ["*"]
  #   exclude_keywords: []

  # learning:
  #   include_keywords: ["architecture", "design patterns", "tutorial", "guide"]
  #   exclude_keywords: []


