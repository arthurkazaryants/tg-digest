      - "vp engineering"
      - "director of engineering"
      - "engineering director"
      - "head of engineering"
      - "vp of engineering"
      - "vp technology"
      - "chief digital officer"
      - "директор по цифровой трансформации"
      - "директора по цифровой трансформации"
      - "директор сто"
      - "директора сто"
      - "директор cto"
      - "директора cto"
