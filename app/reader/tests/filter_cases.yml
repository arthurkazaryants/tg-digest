      ЗАДАЧИ
      • Полная ответственность за техническое состояние и эксплуатацию зданий и сооружений, прилегающую территорию, обслуживание и ремонт парка производственного оборудования.
      • Организация работы по наведению и поддержанию чистоты и порядка в офисных, производственных, складских и бытовых помещениях.
      • Обслуживание и поддержание в исправном состоянии спец. техники, взаимодействие с лизинговыми компаниями на предмет приобретения спец. техники.
      • Контроль за страхованием имущества, сроков производимых платежей.
      • Оптимизация кадрового состава, распределение обязанностей для повышения эффективности, организация обучения персонала, формирование кадрового резерва, мотивация и развитие команды.
      ТРЕБОВАНИЯ
      • Опыт работы по специальности или стаж работы на инженерно-руководящих должностях не менее 5 лет.
      • Знания и навыки: законодательные и нормативно-правовые акты, регламентирующие производственно-хозяйственную и финансово-экономическую деятельность Общества;
      • Профиль, специализацию и особенности структуры Общества;
      • Перспективы технического, экономического и социального развития соответствующей отрасли производства и предприятия.
